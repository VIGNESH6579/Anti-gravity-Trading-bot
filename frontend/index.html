<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gravity Bot | Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="login-container">
        <div class="logo-area">
            <h1>⚡ Anti-Gravity</h1>
            <p>Trading Bot Terminal</p>
        </div>

        <div class="error-msg" id="errorMsg">Invalid credentials or TOTP</div>

        <form id="loginForm">
            <div class="input-group">
                <label>Angel One Client ID</label>
                <input type="text" id="clientId" required placeholder="e.g. V123456" />
            </div>

            <div class="input-group">
                <label>PIN / Password</label>
                <input type="password" id="password" required placeholder="••••••••" />
            </div>

            <div class="input-group">
                <label>API Key (SmartAPI)</label>
                <input type="password" id="apiKey" required placeholder="Enter API Key" />
            </div>

            <div class="input-group totp-group">
                <div class="totp-header">
                    <label>6-Digit Authenticator TOTP</label>
                    <span class="timer" id="totpTimer">⏱ 30s</span>
                </div>
                <input type="text" id="totp" required pattern="\d{6}" maxlength="6" placeholder="000000" autocomplete="off" />
            </div>

            <button type="submit" id="submitBtn">LAUNCH DASHBOARD →</button>
        </form>
        
        <div class="security-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Your TOTP is used once for API login. Nothing is stored.
        </div>
    </div>

    <script src="js/login.js"></script>
    <script>
        // Simple particle effect for background
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.animationDuration = (Math.random() * 10 + 5) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            pContainer.appendChild(p);
        }
    </script>
</body>
</html>
